<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>যোগাযোগ করুন - chainapaikari</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #00c8ff; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        [data-theme="dark"] { --primary: #00c8ff; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Hind Siliguri', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); }

        .theme-toggle { position: fixed; top: 20px; right: 20px; z-index: 1000; cursor: pointer; background: var(--card); padding: 10px 15px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hero { background: linear-gradient(135deg, #00c8ff, #00ff88); padding: 80px 20px; text-align: center; color: white; }
        .container { max-width: 900px; margin: -50px auto 50px; padding: 20px; }

        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .contact-card { background: var(--card); padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border); text-decoration: none; color: var(--text); display: block; }
        .contact-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .icon { font-size: 30px; color: var(--primary); margin-bottom: 15px; }
        .contact-card h3 { margin-bottom: 5px; }
        .contact-card p { font-weight: 700; color: var(--primary); }

        .form-box { background: var(--card); padding: 40px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        input, textarea { width: 100%; padding: 15px; margin-top: 10px; border: 2px solid var(--border); border-radius: 12px; background: transparent; color: var(--text); }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }
        .btn-submit { width: 100%; padding: 18px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: 800; cursor: pointer; margin-top: 20px; font-size: 16px; }
        .btn-submit:hover { transform: scale(1.02); filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></div>

<div class="hero">
    <h1>যোগাযোগ করুন</h1>
    <p>আপনার যেকোনো প্রশ্নের জন্য আমরা প্রস্তুত</p>
</div>

<div class="container">
    <div class="contact-grid">
        <!-- Call Link -->
        <a href="tel:01723109294" class="contact-card">
            <div class="icon"><i class="fa-solid fa-phone"></i></div>
            <h3>ফোন করুন</h3>
            <p>01723109294</p>
        </a>
        <!-- WhatsApp Link -->
        <a href="https://wa.me/8801723109294" target="_blank" class="contact-card">
            <div class="icon"><i class="fa-brands fa-whatsapp"></i></div>
            <h3>WhatsApp</h3>
            <p>01723109294</p>
        </a>
        <!-- Email Link -->
        <a href="mailto:mmrsbd2@gmail.com" class="contact-card">
            <div class="icon"><i class="fa-solid fa-envelope"></i></div>
            <h3>ইমেইল</h3>
            <p>mmrsbd2@gmail.com</p>
        </a>
    </div>

    <div class="form-box">
        <form onsubmit="sendMessage(event)">
            <input type="text" id="name" placeholder="আপনার নাম" required>
            <input type="text" id="subject" placeholder="বিষয়">
            <textarea id="message" rows="5" placeholder="আপনার মেসেজ" required></textarea>
            <button class="btn-submit">মেসেজ পাঠান</button>
        </form>
    </div>
</div>

<script>
    function toggleTheme() {
        const body = document.documentElement;
        body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }
    function sendMessage(e){
        e.preventDefault();
        const name = document.getElementById('name').value;
        const msg = document.getElementById('message').value;
        const subject = document.getElementById('subject').value;
        window.open(`https://wa.me/8801723109294?text=নাম: ${name}%0Aবিষয়: ${subject}%0Aমেসেজ: ${msg}`, '_blank');
    }
</script>
</body>
</html>
