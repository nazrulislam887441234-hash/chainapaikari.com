<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>সকল ক্যাটাগরি - chainapaikari</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700;800&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#2563eb;--accent:#fbbf24;--gradient:linear-gradient(135deg,#2563eb,#00c8ff);--glow:0 0 20px rgba(37,99,235,.15);}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri';}
body{background:linear-gradient(180deg,#f0f9ff 0%,#e0f2fe 100%);color:#1e293b;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}

/* Header - Glass */
.header{position:sticky;top:0;background:rgba(255,255,255,.85);backdrop-filter:blur(15px);z-index:1000;padding:15px 20px;display:flex;align-items:center;gap:15px;box-shadow:0 2px 10px rgba(0,0,0,.05);}
.back-btn{font-size:24px;color:var(--primary);transition:.3s;flex-shrink:0;}
.back-btn:hover{transform:scale(1.1) rotate(-5deg);}
.page-title{font-family:'Poppins';font-size:22px;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* Search - Glass */
.search-box{max-width:981px;margin:20px auto;padding:0 16px;}
.search-box .box{position:relative;}
.search-box input{width:100%;padding:16px 50px 16px 20px;border:1px solid rgba(37,99,235,.2);border-radius:15px;font-size:16px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);box-shadow:0 4px 15px rgba(0,0,0,.04);}
.search-box i{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--primary);font-size:20px;}

/* Categories Grid - Premium Cards */
.container{max-width:1400px;margin:0 auto;padding:20px 16px;}
.categories-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;} /* মোবাইল 2 কলাম */
@media(min-width:480px){.categories-grid{grid-template-columns:repeat(3,1fr);gap:16px;}}
@media(min-width:768px){.categories-grid{grid-template-columns:repeat(4,1fr);gap:20px;}}
@media(min-width:1024px){.categories-grid{grid-template-columns:repeat(6,1fr);gap:22px;}}

.cat-card{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-radius:22px;padding:16px;text-align:center;transition:all .4s cubic-bezier(.68,-0.55,.265,1.55);cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.06);border:2px solid transparent;display:flex;flex-direction:column;justify-content:center;aspect-ratio:1/1.2; /* সব কার্ড এক সাইজ */
overflow:hidden;position:relative;}
.cat-card::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;border-radius:22px;padding:2px;background:var(--gradient);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:.4s;}
.cat-card:hover::before{opacity:1;}
.cat-card:hover{transform:translateY(-8px) scale(1.03);box-shadow:var(--glow);}

.cat-icon{width:65px;height:65px;margin:0 auto 12px;border-radius:50%;overflow:hidden;border:3px solid #fff;transition:.4s;flex-shrink:0;box-shadow:0 4px 15px rgba(37,99,235,.15);}
@media(min-width:768px){.cat-icon{width:85px;height:85px;}}
.cat-card:hover .cat-icon{transform:scale(1.1) rotate(5deg);box-shadow:0 0 25px rgba(37,99,235,.3);}
.cat-icon img{width:100%;height:100%;object-fit:cover;border-radius:50%;} /* 100% Round */
.cat-card h4{font-size:14px;font-weight:800;line-height:1.3;word-break:break-word; /* নাম বড় হলে ভেঙে যাবে */
display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:#1e293b;}

/* Shimmer Loading */
.shimmer{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
@media(min-width:480px){.shimmer{grid-template-columns:repeat(3,1fr);}}
@media(min-width:768px){.shimmer{grid-template-columns:repeat(4,1fr);}}
.shimmer-item{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;border-radius:22px;aspect-ratio:1/1.2;animation:shimmer 1.5s infinite;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.no-data{text-align:center;padding:80px 20px;}
.no-data i{font-size:60px;color:#cbd5e1;margin-bottom:15px;}
.no-data h3{font-size:18px;color:#64748b;margin-bottom:8px;}
.no-data p{color:#94a3b8;}

/* Footer */
footer{background:#fff;text-align:center;padding:30px 20px;color:#64748b;font-size:13px;font-weight:600;border-top:1px solid #e2e8f0;}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="page-title">সকল ক্যাটাগরি</div>
</div>

<!-- Search -->
<div class="search-box">
    <div class="box">
        <input type="text" id="catSearch" placeholder="ক্যাটাগরির নাম লিখুন...">
        <i class="fa-solid fa-magnifying-glass"></i>
    </div>
</div>

<!-- Categories -->
<div class="container">
    <div class="shimmer" id="shimmerLoad">
        <div class="shimmer-item"></div><div class="shimmer-item"></div><div class="shimmer-item"></div><div class="shimmer-item"></div>
    </div>
    <div class="categories-grid" id="categoryGrid" style="display:none;"></div>
    <div class="no-data" id="noData" style="display:none;">
        <i class="fa-solid fa-folder-open"></i>
        <h3>কোনো ক্যাটাগরি পাওয়া যায়নি</h3>
        <p>অন্য কিছু দিয়ে সার্চ করে দেখুন</p>
    </div>
</div>

<footer>© <span id="currentYear"></span> chainapaikari. সর্বস্বত্ব সংরক্ষিত।</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA5q-gEWhHbBB_kn0ZDNPYXC2urpSbpPd8",authDomain:"chaina-paikari.firebaseapp.com",projectId:"chaina-paikari",storageBucket:"chaina-paikari.firebasestorage.app",messagingSenderId:"968909884753",appId:"1:968909884753:web:88ab6754c2edda39bb1770"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allCategories = [];
const grid = document.getElementById('categoryGrid');
const shimmer = document.getElementById('shimmerLoad');
const noData = document.getElementById('noData');

// Auto Year
document.getElementById('currentYear').innerText = new Date().getFullYear();

// Load All Categories
async function loadAllCategories(){
    try{
        const catSnap = await getDocs(collection(db, "categories"));
        
        allCategories = catSnap.docs.map(doc => {
            return {id: doc.id, ...doc.data()};
        });

        shimmer.style.display = 'none';
        grid.style.display = 'grid';
        renderCategories(allCategories);
    }catch(err){
        shimmer.style.display = 'none';
        noData.style.display = 'block';
        noData.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i><h3>Error: ${err.message}</h3>`;
    }
}

function renderCategories(cats){
    if(cats.length === 0){
        grid.style.display = 'none';
        noData.style.display = 'block';
        return;
    }
    grid.style.display = 'grid';
    noData.style.display = 'none';

    grid.innerHTML = cats.map(data => {
        const slug = data.slug || data.id;
        return `
        <a href="category.html?slug=${slug}">
            <div class="cat-card">
                <div class="cat-icon">
                    <img src="${data.image}" alt="${data.name}" loading="lazy">
                </div>
                <h4>${data.name}</h4>
            </div>
        </a>
        `;
    }).join('');
}

// Fast Search Category
let searchTimeout;
document.getElementById('catSearch').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        const keyword = e.target.value.toLowerCase();
        const filtered = allCategories.filter(c => c.name.toLowerCase().includes(keyword));
        renderCategories(filtered);
    }, 200);
});

loadAllCategories();
</script>
</body>
</html>
