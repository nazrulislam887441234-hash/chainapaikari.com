<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">লোড হচ্ছে...</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700;800&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#00c8ff;--accent:#00ff88;--gradient:linear-gradient(90deg,#00c8ff,#00ff88);--glow:0 0 20px rgba(0,200,255,.3);}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri';}
body{background:linear-gradient(180deg,#f0f9ff 0%,#e0f2fe 100%);color:#1e293b;}
a{text-decoration:none;color:inherit;}
.container{max-width:1400px;margin:0 auto;padding:20px;}

/* Header */
.header{background:rgba(255,255,255,.7);backdrop-filter:blur(20px);padding:15px 20px;border-radius:20px;margin-bottom:20px;display:flex;align-items:center;gap:15px;box-shadow:var(--glow);}
.back-btn{font-size:22px;color:var(--primary);}
.cat-title{font-family:'Poppins';font-size:24px;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* Search */
.search-box{width:100%;max-width:600px;margin:0 auto 30px;position:relative;}
.search-box input{width:100%;padding:16px 50px 16px 20px;border:2px solid rgba(0,200,255,.3);border-radius:20px;font-size:16px;background:rgba(255,255,255,.9);box-shadow:var(--glow);}
.search-box i{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--primary);font-size:20px;}

/* Products - Responsive Grid */
.products{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;}
@media(min-width:768px){.products{grid-template-columns:repeat(4,1fr);}} /* ট্যাব */
@media(min-width:992px){.products{grid-template-columns:repeat(5,1fr);}} /* ছোট ডেস্কটপ */
@media(min-width:1200px){.products{grid-template-columns:repeat(6,1fr);gap:20px;}} /* বড় ডেস্কটপ */

.product-card{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-radius:25px;padding:12px;box-shadow:0 8px 30px rgba(0,0,0,.08);transition:.4s;border:2px solid transparent;}
.product-card:hover{transform:translateY(-10px);box-shadow:var(--glow);border-color:var(--primary);}
.product-card img{width:100%;aspect-ratio:1/1;border-radius:20px;object-fit:cover;margin-bottom:8px;}
.product-card h4{font-size:14px;margin-bottom:6px;height:38px;overflow:hidden;font-weight:800;line-height:1.4;}
.current{font-size:17px;font-weight:900;color:var(--accent);}
.old{font-size:12px;color:#94a3b8;text-decoration:line-through;}
.loading{text-align:center;padding:50px;color:var(--primary);font-weight:700;font-size:18px;}
.no-data{text-align:center;padding:50px;color:#94a3b8;font-weight:700;}

/* See More Button */
.load-more{text-align:center;margin-top:30px;}
.load-more button{background:var(--gradient);color:#fff;border:none;padding:14px 35px;border-radius:15px;font-size:16px;font-weight:800;cursor:pointer;transition:.3s;box-shadow:var(--glow);}
.load-more button:hover{transform:scale(1.05);}
.load-more button:disabled{background:#ccc;cursor:not-allowed;}
</style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="cat-title" id="catTitle">লোড হচ্ছে...</div>
    </div>

    <!-- Search -->
    <div class="search-box">
        <input type="text" id="productSearch" placeholder="নাম বা কিওয়ার্ড দিয়ে সার্চ করুন...">
        <i class="fa-solid fa-magnifying-glass"></i>
    </div>

    <!-- Products -->
    <div class="products" id="productGrid"></div>
    <div class="loading" id="loading">পণ্য লোড হচ্ছে...</div>

    <!-- Load More -->
    <div class="load-more" id="loadMoreBtn" style="display:none;">
        <button onclick="loadMoreProducts()">আরো দেখুন <i class="fa-solid fa-arrow-down"></i></button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA5q-gEWhHbBB_kn0ZDNPYXC2urpSbpPd8",authDomain:"chaina-paikari.firebaseapp.com",projectId:"chaina-paikari",storageBucket:"chaina-paikari.firebasestorage.app",messagingSenderId:"968909884753",appId:"1:968909884753:web:88ab6754c2edda39bb1770"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allProducts = []; // সব প্রোডাক্ট
let filteredProducts = []; // সার্চের পর
let displayedCount = 0; // কয়টা দেখাইছি
const perPage = 20; // ১ সাথে ২০ টা

const grid = document.getElementById('productGrid');
const loading = document.getElementById('loading');
const loadMoreBtn = document.getElementById('loadMoreBtn');

// URL থেকে slug নেওয়া
const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");
// Array Shuffle - রেন্ডম করার জন্য
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

async function loadCategoryProducts(){
    if(!slug){
        loading.innerHTML = '<div class="no-data">❌ ক্যাটাগরি পাওয়া যায়নি</div>';
        return;
    }

    // 1. ক্যাটাগরির নাম বের করা
    const catSnap = await getDocs(query(collection(db, "categories"), where("slug", "==", slug)));
    let catName = slug;
    let catId = '';
    if(!catSnap.empty){
        const catData = catSnap.docs[0].data();
        catName = catData.name;
        catId = catSnap.docs[0].id;
    } else {
        catId = slug;
    }
    document.getElementById('catTitle').innerText = catName;
document.title = catName;
    // 2. এই ক্যাটাগরির সব প্রোডাক্ট
    const prodSnap = await getDocs(query(collection(db, "products"), where("categoryId", "==", catId)));
    allProducts = prodSnap.docs.map(doc => ({id: doc.id,...doc.data()}));

    // 3. রেন্ডম ভাবে সাজানো
    allProducts = shuffleArray(allProducts);
    filteredProducts = [...allProducts];

    loading.style.display = 'none';
    loadMoreProducts(); // প্রথম ২০ টা লোড
}

window.loadMoreProducts = () => {
    const nextProducts = filteredProducts.slice(displayedCount, displayedCount + perPage);
    renderProducts(nextProducts, true);
    displayedCount += perPage;

    // আর প্রোডাক্ট আছে কিনা
    if(displayedCount >= filteredProducts.length){
        loadMoreBtn.style.display = 'none';
    } else {
        loadMoreBtn.style.display = 'block';
    }
}

function renderProducts(products, append = false){
    if(!append) grid.innerHTML = '';

    if(products.length == 0 &&!append){
        grid.innerHTML = '<div class="no-data">এই ক্যাটাগরিতে কোনো পণ্য নেই</div>';
        return;
    }

    const html = products.map(p => {
        const current = Number(p.currentPrice || 0);
        const old = Number(p.oldPrice || 0);
        return `
        <a href="product.html?id=${p.id}">
            <div class="product-card">
                <img src="${p.images?.[0] || p.image}" loading="lazy">
                <h4>${p.name}</h4>
                <div class="current">${current} ৳</div>
                ${old > current? `<div class="old">${old} ৳</div>` : ''}
            </div>
        </a>`;
    }).join('');

    grid.innerHTML += html;
}

// Product Search - নাম + কিওয়ার্ড
document.getElementById('productSearch').addEventListener('input', (e) => {
    const keyword = e.target.value.toLowerCase();
    filteredProducts = allProducts.filter(p =>
        p.name.toLowerCase().includes(keyword) ||
        (p.keywords && p.keywords.toLowerCase().includes(keyword))
    );
    displayedCount = 0;
    grid.innerHTML = '';
    loadMoreProducts();
});

loadCategoryProducts();
</script>
</body>
</html>
